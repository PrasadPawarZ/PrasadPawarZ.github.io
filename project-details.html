<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Project Details | Prasad Pawar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #080c13;
      --panel: rgba(15, 23, 42, 0.82);
      --panel-2: rgba(15, 23, 42, 0.58);
      --line: rgba(148, 163, 184, 0.18);
      --text: #f8fafc;
      --muted: #94a3b8;
      --soft: #cbd5e1;
      --cyan: #22d3ee;
      --green: #34d399;
      --violet: #a78bfa;
      --orange: #fbbf24;
      --radius: 22px;
      --mono: 'JetBrains Mono', monospace;
      --display: 'Space Grotesk', sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background:
        radial-gradient(circle at 12% 8%, rgba(34,211,238,.22), transparent 30%),
        radial-gradient(circle at 80% 0%, rgba(167,139,250,.2), transparent 28%),
        linear-gradient(145deg, #080c13 0%, #0f172a 55%, #07111f 100%);
      color: var(--text);
      font-family: var(--display);
      line-height: 1.6;
    }

    a { color: inherit; }

    .page {
      width: min(1160px, calc(100% - 32px));
      margin: 0 auto;
      padding: 28px 0 64px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 34px;
    }

    .back {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255,255,255,.04);
      color: var(--soft);
      text-decoration: none;
      font-family: var(--mono);
      font-size: 0.78rem;
    }

    .brand {
      color: var(--muted);
      font-family: var(--mono);
      font-size: 0.74rem;
      letter-spacing: .1em;
      text-transform: uppercase;
    }

    .hero {
      display: grid;
      grid-template-columns: minmax(0, 1.1fr) minmax(320px, .9fr);
      gap: 28px;
      align-items: stretch;
      margin-bottom: 32px;
    }

    .hero-copy,
    .hero-preview,
    .section-card {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel);
      box-shadow: 0 24px 80px rgba(0,0,0,.28);
      backdrop-filter: blur(16px);
    }

    .hero-copy { padding: clamp(24px, 4vw, 42px); }

    .eyebrow {
      color: var(--cyan);
      font-family: var(--mono);
      font-size: .76rem;
      letter-spacing: .14em;
      text-transform: uppercase;
      margin-bottom: 16px;
    }

    h1 {
      font-size: clamp(2.3rem, 7vw, 5.4rem);
      line-height: .92;
      letter-spacing: -0.08em;
      max-width: 780px;
      margin-bottom: 20px;
    }

    .summary {
      color: var(--soft);
      max-width: 760px;
      font-size: 1.02rem;
    }

    .meta-row,
    .actions,
    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 22px;
    }

    .pill,
    .chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border: 1px solid var(--line);
      border-radius: 999px;
      color: var(--soft);
      background: rgba(255,255,255,.045);
      font-family: var(--mono);
      font-size: .72rem;
      padding: 7px 11px;
    }

    .action {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 40px;
      padding: 10px 16px;
      border-radius: 999px;
      border: 1px solid rgba(34,211,238,.48);
      color: #ecfeff;
      background: rgba(34,211,238,.12);
      text-decoration: none;
      font-family: var(--mono);
      font-size: .78rem;
      transition: transform .2s ease, background .2s ease;
    }

    .action:hover {
      transform: translateY(-2px);
      background: rgba(34,211,238,.2);
    }

    .hero-preview {
      min-height: 320px;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      position: relative;
    }

    .hero-preview::before {
      content: '';
      position: absolute;
      inset: -25%;
      background:
        radial-gradient(circle at 20% 20%, rgba(34,211,238,.18), transparent 24%),
        radial-gradient(circle at 70% 70%, rgba(52,211,153,.16), transparent 26%);
      transform: rotate(8deg);
    }

    .hero-preview img,
    .gallery img {
      width: 100%;
      border-radius: 16px;
      border: 1px solid var(--line);
      background: #020617;
      position: relative;
      z-index: 1;
    }

    .hero-preview img {
      max-height: 430px;
      object-fit: contain;
    }

    .visual-panel {
      width: 100%;
      min-height: 260px;
      border-radius: 18px;
      border: 1px solid var(--line);
      background:
        linear-gradient(135deg, rgba(34,211,238,.16), transparent 36%),
        linear-gradient(315deg, rgba(167,139,250,.18), transparent 38%),
        rgba(15,23,42,.92);
      padding: 22px;
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      overflow: hidden;
    }

    .visual-panel::after {
      content: '';
      position: absolute;
      right: -18%;
      bottom: -28%;
      width: 250px;
      height: 250px;
      border-radius: 999px;
      background: rgba(34,211,238,.12);
      filter: blur(14px);
    }

    .visual-label {
      color: var(--cyan);
      font-family: var(--mono);
      font-size: .72rem;
      letter-spacing: .14em;
      text-transform: uppercase;
      position: relative;
      z-index: 1;
    }

    .visual-title {
      font-size: clamp(1.6rem, 5vw, 3.4rem);
      line-height: .95;
      letter-spacing: -.06em;
      max-width: 430px;
      position: relative;
      z-index: 1;
    }

    .visual-lines {
      display: grid;
      gap: 9px;
      position: relative;
      z-index: 1;
    }

    .visual-lines span {
      display: block;
      height: 10px;
      border-radius: 999px;
      background: rgba(255,255,255,.1);
    }

    .visual-lines span:nth-child(1) { width: 78%; }
    .visual-lines span:nth-child(2) { width: 52%; }
    .visual-lines span:nth-child(3) { width: 64%; }

    .layout {
      display: grid;
      grid-template-columns: minmax(0, .92fr) minmax(0, 1.08fr);
      gap: 24px;
    }

    .section-card { padding: 24px; }

    h2 {
      font-size: 1.15rem;
      letter-spacing: -.03em;
      margin-bottom: 14px;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
      gap: 14px;
    }

    .shot {
      background: var(--panel-2);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 10px;
    }

    .shot figcaption {
      color: var(--muted);
      font-family: var(--mono);
      font-size: .72rem;
      margin-top: 8px;
      padding: 0 2px;
    }

    .readme {
      display: grid;
      gap: 18px;
      color: var(--soft);
    }

    .readme-block {
      border: 1px solid var(--line);
      border-radius: 16px;
      background: rgba(255,255,255,.035);
      padding: 16px;
    }

    .readme-block h3 {
      color: var(--text);
      font-size: .95rem;
      margin-bottom: 8px;
    }

    ul, ol {
      padding-left: 20px;
      color: var(--soft);
    }

    li { margin: 5px 0; }

    code {
      font-family: var(--mono);
      color: #cffafe;
      background: rgba(34,211,238,.09);
      padding: 2px 5px;
      border-radius: 6px;
    }

    .empty {
      color: var(--muted);
      border: 1px dashed var(--line);
      border-radius: 16px;
      padding: 18px;
      background: rgba(255,255,255,.025);
    }

    @media (max-width: 900px) {
      .hero,
      .layout {
        grid-template-columns: 1fr;
      }

      .topbar {
        align-items: flex-start;
        flex-direction: column;
      }
    }
  </style>
</head>

        category: 'C++ Systems',
        status: 'Repository available',
        repo: 'https://github.com/PrasadPawarZ/Hotel_Room_Booking',
        summary: 'A C++ hotel management application for room booking, check-in and checkout operations, customer records, and billing.',
        tech: ['C++', 'OOP', 'Data Structures'],
        gallery: [],
        visualLabel: 'Console App',
        readme: {
          Overview: 'The project uses C++ OOP concepts to manage hotel rooms and booking data.',
          Highlights: ['Room booking', 'Customer records', 'Check-in and checkout', 'Billing flow'],
          'Project Notes': ['A terminal screenshot can be added later when the console flow is captured']
        }
      }
    };

    const params = new URLSearchParams(window.location.search);
    const id = params.get('project') || 'trash-view-on-maps';
    const project = projects[id] || projects['trash-view-on-maps'];

    document.title = `${project.title} | Prasad Pawar`;
    document.getElementById('category').textContent = project.category;
    document.getElementById('title').textContent = project.title;
    document.getElementById('summary').textContent = project.summary;
    document.getElementById('meta').innerHTML = `
      <span class="pill">${project.status}</span>
      <span class="pill">${project.gallery.length || 1} visual${(project.gallery.length || 1) > 1 ? 's' : ''}</span>
    `;
    document.getElementById('tech').innerHTML = project.tech.map(t => `<span class="chip">${t}</span>`).join('');
    document.getElementById('actions').innerHTML = `
      <a class="action" href="index.html#projects">Back to projects</a>
      ${project.repo ? `<a class="action" href="${project.repo}" target="_blank" rel="noopener">Open GitHub repo</a>` : ''}
    `;

    const heroPreview = document.getElementById('heroPreview');
    const firstImage = project.gallery[0];
    if (firstImage) {
      heroPreview.innerHTML = `<img src="${firstImage[0]}" alt="${project.title} main screenshot">`;
    } else {
      heroPreview.innerHTML = renderVisual(project.visualLabel || project.category, project.title);
    }

    const gallery = document.getElementById('gallery');
    if (project.gallery.length) {
      gallery.innerHTML = project.gallery.map(([src, caption]) => `
        <figure class="shot">
          <a href="${src}" target="_blank" rel="noopener">
            <img src="${src}" alt="${caption}">
          </a>
          <figcaption>${caption}</figcaption>
        </figure>
      `).join('');
    } else {
      gallery.innerHTML = `
        <div class="empty">No exported UI screenshot was found for this project yet. I added a clean visual project panel and README-style details so the portfolio page still has a dedicated destination.</div>
        <div class="shot">${renderVisual(project.visualLabel || project.category, project.title)}</div>
      `;
    }

    const readme = document.getElementById('readme');
    readme.innerHTML = Object.entries(project.readme).map(([heading, value]) => {
      const body = Array.isArray(value)
        ? `<ul>${value.map(item => `<li>${item}</li>`).join('')}</ul>`
        : `<p>${value}</p>`;
      return `<section class="readme-block"><h3>${heading}</h3>${body}</section>`;
    }).join('');

    function renderVisual(label, title) {
      return `
        <div class="visual-panel">
          <div class="visual-label">${label}</div>
          <div class="visual-title">${title}</div>
          <div class="visual-lines"><span></span><span></span><span></span></div>
        </div>
      `;
    }
  </script>
</body>
</html>
