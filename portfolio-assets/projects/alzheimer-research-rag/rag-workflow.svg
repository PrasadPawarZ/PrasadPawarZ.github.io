<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Alzheimer Research RAG workflow</title>
  <desc id="desc">A visual workflow showing paper ingestion, chunking, vector search, citations, and answer validation.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset=".52" stop-color="#1e1b4b"/>
      <stop offset="1" stop-color="#083344"/>
    </linearGradient>
    <linearGradient id="card" x1="0" x2="1">
      <stop offset="0" stop-color="#111827"/>
      <stop offset="1" stop-color="#0f766e"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000000" flood-opacity=".35"/>
    </filter>
  </defs>
  <rect width="1200" height="675" rx="30" fill="url(#bg)"/>
  <circle cx="1040" cy="92" r="160" fill="#22d3ee" opacity=".16"/>
  <circle cx="132" cy="555" r="210" fill="#a78bfa" opacity=".14"/>
  <text x="70" y="92" fill="#f8fafc" font-size="44" font-weight="700" font-family="Inter, Arial, sans-serif">Alzheimer Research RAG</text>
  <text x="72" y="130" fill="#bae6fd" font-size="20" font-family="JetBrains Mono, Consolas, monospace">PDF/TXT ingestion -> citations -> validated answer</text>
  <g filter="url(#shadow)" font-family="Inter, Arial, sans-serif">
    <g transform="translate(74 210)">
      <rect width="196" height="150" rx="18" fill="#111827" stroke="#38bdf8" stroke-opacity=".55"/>
      <text x="26" y="44" fill="#e0f2fe" font-size="20" font-weight="700">Research PDFs</text>
      <text x="26" y="78" fill="#94a3b8" font-size="16">Alzheimer MRI</text>
      <text x="26" y="106" fill="#94a3b8" font-size="16">papers and notes</text>
    </g>
    <g transform="translate(338 210)">
      <rect width="196" height="150" rx="18" fill="#111827" stroke="#a78bfa" stroke-opacity=".6"/>
      <text x="26" y="44" fill="#ede9fe" font-size="20" font-weight="700">Chunk + Embed</text>
      <text x="26" y="78" fill="#94a3b8" font-size="16">Page metadata</text>
      <text x="26" y="106" fill="#94a3b8" font-size="16">sentence windows</text>
    </g>
    <g transform="translate(602 210)">
      <rect width="196" height="150" rx="18" fill="#111827" stroke="#34d399" stroke-opacity=".58"/>
      <text x="26" y="44" fill="#d1fae5" font-size="20" font-weight="700">Vector Store</text>
      <text x="26" y="78" fill="#94a3b8" font-size="16">ChromaDB</text>
      <text x="26" y="106" fill="#94a3b8" font-size="16">hybrid rerank</text>
    </g>
    <g transform="translate(866 210)">
      <rect width="196" height="150" rx="18" fill="#111827" stroke="#f59e0b" stroke-opacity=".62"/>
      <text x="26" y="44" fill="#fef3c7" font-size="20" font-weight="700">Answer API</text>
      <text x="26" y="78" fill="#94a3b8" font-size="16">FastAPI</text>
      <text x="26" y="106" fill="#94a3b8" font-size="16">Streamlit demo</text>
    </g>
  </g>
  <g stroke="#e2e8f0" stroke-width="4" stroke-linecap="round" opacity=".65">
    <path d="M286 285h34"/>
    <path d="M550 285h34"/>
    <path d="M814 285h34"/>
  </g>
  <g transform="translate(90 455)" font-family="Inter, Arial, sans-serif">
    <rect width="1020" height="96" rx="20" fill="url(#card)" opacity=".9"/>
    <text x="34" y="38" fill="#ecfeff" font-size="21" font-weight="700">Guardrails</text>
    <text x="34" y="70" fill="#dbeafe" font-size="18">confidence scoring, citation validation, contradiction checks, multilingual query handling, extractive fallback</text>
  </g>
</svg>
